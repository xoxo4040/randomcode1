<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="key.png" type="image/x-icon">
    <title>쉬운 오븐생활을 돕는 난수 아이디 복사기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Bodoni+Moda:ital,wght@1,400;1,700&family=VT323&family=Inter:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f8f8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .id-card {
            background-color: #0000ff;
            border-radius: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease, background-color 0.2s ease;
        }

        .id-card:hover {
            transform: translate(-3px, -3px);
            box-shadow: 4px 4px 0px #111111;
        }

        .id-card.copied {
            background-color: #111111;
        }

        .btn-copy {
            background: transparent;
            border: none;
            cursor: pointer;
            color: #ffffff;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0.75;
            transition: opacity 0.15s ease;
            flex-shrink: 0;
        }

        .btn-copy:hover {
            opacity: 1;
        }

        .btn-copy.copied {
            opacity: 1;
        }

        .btn-refresh {
            background: transparent;
            color: #111111;
            border: 1.5px solid #111111;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 0.72rem;
            letter-spacing: 0.1em;
            padding: 9px 24px;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.15s ease, color 0.15s ease;
        }

        .btn-refresh:hover {
            background: #0000ff;
            color: #ffffff;
            border-color: #0000ff;
        }

        .subtitle-serif {
            font-family: 'Playfair Display', serif;
            font-style: italic;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [passwords, setPasswords] = useState([]);
            const [copiedIndex, setCopiedIndex] = useState(null);

            useEffect(() => {
                const newPasswords = generatePasswords();
                if (newPasswords && newPasswords.length > 0) {
                    copyToClipboard(newPasswords[0], 0);
                }
            }, []);

            const generatePasswords = () => {
                const upper = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
                const lower = "abcdefghijklmnopqrstuvwxyz";
                const numbers = "0123456789";
                const allChars = upper + lower + numbers;
                const length = 12;

                const newPasswords = Array.from({ length: 5 }, () => {
                    let pwd = [];
                    pwd.push(upper[Math.floor(Math.random() * upper.length)]);
                    pwd.push(lower[Math.floor(Math.random() * lower.length)]);
                    pwd.push(numbers[Math.floor(Math.random() * numbers.length)]);
                    for (let i = 3; i < length; i++) {
                        pwd.push(allChars[Math.floor(Math.random() * allChars.length)]);
                    }
                    for (let i = pwd.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [pwd[i], pwd[j]] = [pwd[j], pwd[i]];
                    }
                    return pwd.join("");
                });
                setPasswords(newPasswords);
                // 새로 생성 시 첫 번째 항목 자동 복사
                copyToClipboard(newPasswords[0], 0);
                return newPasswords;
            };

            const copyToClipboard = (text, index) => {
                navigator.clipboard.writeText(text).then(() => {
                    setCopiedIndex(index);
                    setTimeout(() => setCopiedIndex(null), 2000);
                }).catch(err => console.error('복사 실패:', err));
            };

            return (
                <div style={{ width: '100%', maxWidth: '360px', padding: '0 20px' }}>

                    {/* 헤더 */}
                    <div style={{ marginBottom: '24px' }}>
                        <p className="subtitle-serif" style={{ fontSize: '0.9rem', color: '#888888', marginBottom: '6px' }}>
                            — 쉬운 오븐생활을 위한
                        </p>
                        <h1 style={{ lineHeight: 1.05, color: '#111111' }}>
                            {/* Line 1: RANDOM — Syne 800 */}
                            <span style={{ display: 'block' }}>
                                <span style={{
                                    fontFamily: "'Syne', sans-serif",
                                    fontWeight: 800,
                                    fontSize: 'clamp(1.6rem, 8.5vw, 2.4rem)',
                                    letterSpacing: '-0.02em',
                                }}>RANDOM</span>
                            </span>
                            {/* Line 2: ID — Bodoni Moda Italic Bold */}
                            <span style={{ display: 'block' }}>
                                <span style={{
                                    fontFamily: "'Bodoni Moda', serif",
                                    fontStyle: 'italic',
                                    fontWeight: 700,
                                    fontSize: 'clamp(2.4rem, 13vw, 3.6rem)',
                                    letterSpacing: '-0.01em',
                                }}>ID</span>
                            </span>
                            {/* Line 3: GENErator — Bodoni Moda Italic regular */}
                            <span style={{ display: 'block' }}>
                                <span style={{
                                    fontFamily: "'Bodoni Moda', serif",
                                    fontStyle: 'italic',
                                    fontWeight: 400,
                                    fontSize: 'clamp(1.9rem, 10vw, 2.7rem)',
                                    letterSpacing: '0.01em',
                                }}>GENErator</span>
                            </span>
                        </h1>
                        <p style={{ marginTop: '10px', fontSize: '0.72rem', color: '#999999', letterSpacing: '0.02em', lineHeight: 1.5 }}>
                            대문자·소문자·숫자로 구성된 난수 아이디를 자동 생성합니다
                        </p>
                    </div>

                    {/* 카드 리스트 */}
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '6px' }}>
                        {passwords.map((pwd, index) => (
                            <div
                                key={index}
                                className={`id-card${copiedIndex === index ? ' copied' : ''}`}
                                onClick={() => copyToClipboard(pwd, index)}
                            >
                                <code style={{
                                    fontFamily: "'VT323', monospace",
                                    fontWeight: 400,
                                    fontSize: '1.25rem',
                                    color: '#ffffff',
                                    letterSpacing: '0.08em',
                                }}>
                                    {pwd}
                                </code>
                                <span className={`btn-copy ${copiedIndex === index ? 'copied' : ''}`}>
                                    {copiedIndex === index ? (
                                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <rect x="3" y="3" width="18" height="18" rx="0" strokeWidth={2} />
                                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M7 12l4 4 6-7" />
                                        </svg>
                                    ) : (
                                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <rect x="3" y="3" width="18" height="18" rx="0" strokeWidth={2} />
                                        </svg>
                                    )}
                                </span>
                            </div>
                        ))}
                    </div>

                    {/* 새로고침 버튼 */}
                    <div style={{ marginTop: '20px', display: 'flex', justifyContent: 'center' }}>
                        <button className="btn-refresh" onClick={generatePasswords}>
                            REGENERATE
                        </button>
                    </div>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
