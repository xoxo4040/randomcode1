<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="key.png" type="image/x-icon">
    <title>집에 돌아가고 싶은 난수 아이디 복사기</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel CDN (for JSX) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #fef7e7;
            min-height: 100vh;
        }

        .card-orange {
            background-color: #ffc357;
            border-radius: 4px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-orange:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(255, 195, 87, 0.3);
        }

        .card-green {
            background-color: #bad47c;
            border-radius: 4px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-green:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 20px rgba(186, 212, 124, 0.3);
        }

        .btn-animation {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [passwords, setPasswords] = useState([]);
            const [copiedIndex, setCopiedIndex] = useState(null);

            useEffect(() => {
                const newPasswords = generatePasswords();
                if (newPasswords && newPasswords.length > 0) {
                    copyToClipboard(newPasswords[0], 0);
                }
            }, []);

            const generatePasswords = () => {
                const upper = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
                const lower = "abcdefghijklmnopqrstuvwxyz";
                const numbers = "0123456789";
                const allChars = upper + lower + numbers;
                const length = 12;

                const newPasswords = Array.from({ length: 5 }, () => {
                    let pwd = [];
                    pwd.push(upper[Math.floor(Math.random() * upper.length)]);
                    pwd.push(lower[Math.floor(Math.random() * lower.length)]);
                    pwd.push(numbers[Math.floor(Math.random() * numbers.length)]);

                    for (let i = 3; i < length; i++) {
                        pwd.push(allChars[Math.floor(Math.random() * allChars.length)]);
                    }

                    for (let i = pwd.length - 1; i > 0; i--) {
                        const j = Math.floor(Math.random() * (i + 1));
                        [pwd[i], pwd[j]] = [pwd[j], pwd[i]];
                    }

                    return pwd.join("");
                });
                setPasswords(newPasswords);
                return newPasswords;
            };

            const copyToClipboard = (text, index) => {
                navigator.clipboard.writeText(text).then(() => {
                    setCopiedIndex(index);
                    setTimeout(() => setCopiedIndex(null), 2000);
                }).catch(err => {
                    console.error('클립보드 복사 실패:', err);
                });
            };

            return (
                <div className="flex flex-col items-center justify-center min-h-screen p-4">
                    <div className="w-full max-w-xl space-y-6">
                        <div className="text-center space-y-2">
                            <h1 className="text-2xl sm:text-3xl font-extrabold text-[#98b74e] tracking-tight leading-tight">
                                집에 돌아가고 싶은 난수 아이디 복사기
                            </h1>
                            <p className="text-[#e7b75f] font-normal text-sm sm:text-base leading-relaxed break-keep">
                                대문자, 소문자, 숫자로 구성된 난수 아이디를 자동 생성 복사합니다
                            </p>
                        </div>

                        <div className="space-y-4">
                            {passwords.map((pwd, index) => {
                                const isEven = index % 2 === 0;
                                return (
                                    <div
                                        key={index}
                                        className={`${isEven ? 'card-orange' : 'card-green'} flex items-center justify-between p-4`}
                                    >
                                        <code className="text-xl font-mono text-[#f5ede2] font-bold">{pwd}</code>
                                        <button
                                            onClick={() => copyToClipboard(pwd, index)}
                                            className={`flex items-center gap-2 px-5 py-2 rounded text-sm font-bold btn-animation ${copiedIndex === index
                                                ? "bg-white/40 text-white"
                                                : isEven ? "bg-[#fdd68e] text-[#abb46d]" : "bg-[#dddead] text-[#abb46d]"
                                                }`}
                                        >
                                            {copiedIndex === index ? (
                                                <>
                                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2.5} d="M5 13l4 4L19 7" />
                                                    </svg>
                                                    복사됨!
                                                </>
                                            ) : (
                                                <>
                                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3" />
                                                    </svg>
                                                    복사
                                                </>
                                            )}
                                        </button>
                                    </div>
                                );
                            })}
                        </div>

                        <div className="pt-4 text-center">
                            <button
                                onClick={generatePasswords}
                                className="text-[#c5b399] text-sm font-normal hover:scale-110 hover:text-[#98b74e] btn-animation inline-block"
                            >
                                맘에들때까지 새로고침
                            </button>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
